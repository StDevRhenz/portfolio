<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KNN Shape Classifier</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #fff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 40px;
  gap: 14px;
}
canvas { display: block; }
#draw { border: 1.5px solid #111; cursor: crosshair; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
button {
  padding: 8px 22px;
  font-size: 14px;
  border: 1.5px solid #111;
  background: #fff;
  cursor: pointer;
  border-radius: 4px;
}
button:hover { background: #f0f0f0; }
button.primary { background: #111; color: #fff; }
button.primary:hover { background: #333; }
#pipeline-wrap { width: 100%; overflow-x: auto; }
#kval-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
</style>
</head>
<body>

<canvas id="draw" width="300" height="300"></canvas>

<div class="btn-row">
  <button class="primary" onclick="analyze()">Classify</button>
  <button onclick="clearAll()">Clear</button>
</div>

<div id="kval-row">
  <label for="kslider">K =</label>
  <input type="range" id="kslider" min="1" max="9" step="2" value="3" style="width:120px;">
  <span id="kval">3</span>
</div>

<div id="pipeline-wrap">
  <canvas id="pipeline"></canvas>
</div>

<script>
const drawCanvas = document.getElementById("draw");
const dctx = drawCanvas.getContext("2d");
const pipe = document.getElementById("pipeline");
const pctx = pipe.getContext("2d");
const kslider = document.getElementById("kslider");
const kvalDisplay = document.getElementById("kval");
kslider.addEventListener("input", () => { kvalDisplay.textContent = kslider.value; });

let drawing = false;
let points = [];

function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}
drawCanvas.addEventListener("mousedown", e => { drawing = true; pushPt(getPos(e, drawCanvas)); });
drawCanvas.addEventListener("mouseup", () => drawing = false);
drawCanvas.addEventListener("mouseleave", () => drawing = false);
drawCanvas.addEventListener("mousemove", e => { if (!drawing) return; pushPt(getPos(e, drawCanvas)); });
drawCanvas.addEventListener("touchstart", e => { e.preventDefault(); drawing = true; pushPt(getPos(e.touches[0], drawCanvas)); }, { passive: false });
drawCanvas.addEventListener("touchend", () => drawing = false);
drawCanvas.addEventListener("touchmove", e => { e.preventDefault(); if (!drawing) return; pushPt(getPos(e.touches[0], drawCanvas)); }, { passive: false });

function pushPt(p) {
  points.push(p);
  dctx.fillStyle = "#111";
  dctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
}

function clearAll() {
  dctx.clearRect(0, 0, 300, 300);
  pctx.clearRect(0, 0, pipe.width, pipe.height);
  points = [];
}

const PAD = 16;
const N = 120;

function normalize(pts, size) {
  const range = size - PAD * 2;
  const minX = Math.min(...pts.map(p => p.x));
  const maxX = Math.max(...pts.map(p => p.x));
  const minY = Math.min(...pts.map(p => p.y));
  const maxY = Math.max(...pts.map(p => p.y));
  const w = maxX - minX || 1, h = maxY - minY || 1;
  const scale = range / Math.max(w, h);
  const offX = PAD + (range - w * scale) / 2;
  const offY = PAD + (range - h * scale) / 2;
  return pts.map(p => ({ x: (p.x - minX) * scale + offX, y: (p.y - minY) * scale + offY }));
}

function resample(pts, n) {
  if (pts.length < 2) return pts;
  let total = 0;
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
    total += Math.sqrt(dx*dx + dy*dy);
  }
  const interval = total / (n - 1);
  const result = [pts[0]];
  let acc = 0;
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (acc + d >= interval) {
      const t = (interval - acc) / d;
      result.push({ x: pts[i-1].x + dx*t, y: pts[i-1].y + dy*t });
      acc = 0;
      if (result.length >= n) break;
    } else { acc += d; }
  }
  while (result.length < n) result.push(pts[pts.length-1]);
  return result;
}

function nearestDist(a, b) {
  let total = 0;
  for (let i = 0; i < a.length; i++) {
    let best = Infinity;
    for (let j = 0; j < b.length; j++) {
      const dx = a[i].x - b[j].x, dy = a[i].y - b[j].y;
      const d = dx*dx + dy*dy;
      if (d < best) best = d;
    }
    total += Math.sqrt(best);
  }
  return total / a.length;
}

// --- Template generators (size = canvas cell size) ---
function makeTriangle(size, variant) {
  const r = size - PAD * 2, cx = size / 2;
  const variants = [
    // equilateral
    [{ x: cx, y: PAD }, { x: PAD, y: PAD+r }, { x: PAD+r, y: PAD+r }, { x: cx, y: PAD }],
    // right
    [{ x: PAD, y: PAD }, { x: PAD, y: PAD+r }, { x: PAD+r, y: PAD+r }, { x: PAD, y: PAD }],
    // wide
    [{ x: cx, y: PAD+r*0.2 }, { x: PAD, y: PAD+r }, { x: PAD+r, y: PAD+r }, { x: cx, y: PAD+r*0.2 }],
    // tall isosceles
    [{ x: cx, y: PAD }, { x: cx-r*0.3, y: PAD+r }, { x: cx+r*0.3, y: PAD+r }, { x: cx, y: PAD }],
    // left-leaning
    [{ x: PAD+r*0.2, y: PAD }, { x: PAD, y: PAD+r }, { x: PAD+r, y: PAD+r }, { x: PAD+r*0.2, y: PAD }],
  ];
  const corners = variants[variant % variants.length];
  const pts = [];
  for (let i = 0; i < corners.length - 1; i++) {
    for (let s = 0; s < 60; s++) {
      const t = s / 60;
      pts.push({ x: corners[i].x + (corners[i+1].x - corners[i].x)*t, y: corners[i].y + (corners[i+1].y - corners[i].y)*t });
    }
  }
  return pts;
}

function makeSquare(size, variant) {
  const r = size - PAD * 2;
  const variants = [
    // normal square
    [{ x: PAD, y: PAD }, { x: PAD+r, y: PAD }, { x: PAD+r, y: PAD+r }, { x: PAD, y: PAD+r }, { x: PAD, y: PAD }],
    // wide rect
    [{ x: PAD, y: PAD+r*0.2 }, { x: PAD+r, y: PAD+r*0.2 }, { x: PAD+r, y: PAD+r*0.8 }, { x: PAD, y: PAD+r*0.8 }, { x: PAD, y: PAD+r*0.2 }],
    // tall rect
    [{ x: PAD+r*0.2, y: PAD }, { x: PAD+r*0.8, y: PAD }, { x: PAD+r*0.8, y: PAD+r }, { x: PAD+r*0.2, y: PAD+r }, { x: PAD+r*0.2, y: PAD }],
    // smaller square centered
    [{ x: PAD+r*0.1, y: PAD+r*0.1 }, { x: PAD+r*0.9, y: PAD+r*0.1 }, { x: PAD+r*0.9, y: PAD+r*0.9 }, { x: PAD+r*0.1, y: PAD+r*0.9 }, { x: PAD+r*0.1, y: PAD+r*0.1 }],
    // slightly rotated feel (diamond)
    [{ x: size/2, y: PAD }, { x: PAD+r, y: size/2 }, { x: size/2, y: PAD+r }, { x: PAD, y: size/2 }, { x: size/2, y: PAD }],
  ];
  const corners = variants[variant % variants.length];
  const pts = [];
  for (let i = 0; i < corners.length - 1; i++) {
    for (let s = 0; s < 60; s++) {
      const t = s / 60;
      pts.push({ x: corners[i].x + (corners[i+1].x - corners[i].x)*t, y: corners[i].y + (corners[i+1].y - corners[i].y)*t });
    }
  }
  return pts;
}

function makeCircle(size, variant) {
  const cx = size / 2, cy = size / 2;
  const radii = [
    (size - PAD * 2) / 2,
    (size - PAD * 2) / 2 * 0.85,
    (size - PAD * 2) / 2 * 0.7,
  ];
  const offsets = [[0,0],[0,0],[PAD*0.3, -PAD*0.2]];
  const rx = radii[variant % radii.length];
  const ry = [rx, rx * 0.85, rx][variant % 3];
  const ox = offsets[variant % offsets.length][0];
  const oy2 = offsets[variant % offsets.length][1];
  const pts = [];
  const steps = 180;
  for (let s = 0; s <= steps; s++) {
    const angle = (s / steps) * Math.PI * 2;
    pts.push({ x: cx + ox + Math.cos(angle) * rx, y: cy + oy2 + Math.sin(angle) * ry });
  }
  return pts;
}

// Build training set: { label, pts }[]
function buildTrainingSet(size) {
  const training = [];
  for (let v = 0; v < 5; v++) training.push({ label: "triangle", pts: resample(makeTriangle(size, v), N) });
  for (let v = 0; v < 5; v++) training.push({ label: "square",   pts: resample(makeSquare(size, v), N) });
  for (let v = 0; v < 3; v++) training.push({ label: "circle",   pts: resample(makeCircle(size, v), N) });
  return training;
}

// KNN classify
function knnClassify(query, training, k) {
  const dists = training.map(t => ({ label: t.label, dist: nearestDist(query, t.pts) }));
  dists.sort((a, b) => a.dist - b.dist);
  const neighbors = dists.slice(0, k);
  const votes = {};
  neighbors.forEach(n => { votes[n.label] = (votes[n.label] || 0) + 1; });
  const winner = Object.entries(votes).sort((a,b) => b[1]-a[1])[0][0];
  return { winner, neighbors, votes, dists };
}

const SHAPE_COLORS = { triangle: "#2563eb", square: "#d97706", circle: "#dc2626" };

function drawDots(ctx, pts, ox, oy, color, sz) {
  ctx.fillStyle = color;
  sz = sz || 2.5;
  pts.forEach(p => ctx.fillRect(ox + p.x - sz/2, oy + p.y - sz/2, sz, sz));
}

function drawArrow(ctx, x1, y1, x2, y2) {
  const headLen = 8, angle = Math.atan2(y2-y1, x2-x1);
  ctx.strokeStyle = "#bbb"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.fillStyle = "#bbb";
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2 - headLen*Math.cos(angle-0.4), y2 - headLen*Math.sin(angle-0.4));
  ctx.lineTo(x2 - headLen*Math.cos(angle+0.4), y2 - headLen*Math.sin(angle+0.4));
  ctx.closePath(); ctx.fill();
}

function analyze() {
  if (points.length < 10) { alert("Draw something first!"); return; }

  const K = parseInt(kslider.value);
  const availW = Math.max((document.getElementById("pipeline-wrap").clientWidth || window.innerWidth) - 32, 500);
  const STEPS = 5;
  const ARR_W = 28;
  const CSIZE = Math.floor((availW - ARR_W * (STEPS - 1)) / STEPS);
  const TOTAL_W = STEPS * CSIZE + ARR_W * (STEPS - 1);
  const LABH = 20; const SUBLABH = 16;
  const BOT_H = 100;
  const TOTAL_H = LABH + SUBLABH + CSIZE + BOT_H;

  pipe.width = TOTAL_W;
  pipe.height = TOTAL_H;
  pctx.clearRect(0, 0, TOTAL_W, TOTAL_H);

  const normPts   = resample(normalize(points, CSIZE), N);
  const training  = buildTrainingSet(CSIZE);
  const { winner, neighbors, votes, dists } = knnClassify(normPts, training, K);

  const winnerColor = SHAPE_COLORS[winner];

  const stepX = i => i * (CSIZE + ARR_W);
  const ROW_Y = LABH + SUBLABH;
  const fs = Math.max(10, Math.min(13, CSIZE / 13));

  const stepLabels = [
    { label: "Input", sub: "raw strokes" },
    { label: "Normalize", sub: "scale + center" },
    { label: "Compare to all", sub: training.length + " templates" },
    { label: "K nearest (K="+K+")", sub: "vote!" },
    { label: "Output", sub: "" },
  ];

  // draw step headers + boxes + arrows
  stepLabels.forEach((s, i) => {
    const ox = stepX(i), oy = ROW_Y;
    pctx.fillStyle = "#111"; pctx.font = `500 ${fs}px Arial`; pctx.textAlign = "center";
    pctx.fillText(s.label, ox + CSIZE/2, fs + 2);
    pctx.fillStyle = "#999"; pctx.font = `${fs-1}px Arial`;
    pctx.fillText(s.sub, ox + CSIZE/2, LABH + fs);
    pctx.strokeStyle = "#e5e5e5"; pctx.lineWidth = 1;
    pctx.strokeRect(ox + 0.5, oy + 0.5, CSIZE, CSIZE);
    if (i < stepLabels.length - 1) drawArrow(pctx, ox+CSIZE+4, oy+CSIZE/2, ox+CSIZE+ARR_W-4, oy+CSIZE/2);
  });

  // Step 1 — Input
  drawDots(pctx, normalize(points, CSIZE), stepX(0), ROW_Y, "#111");

  // Step 2 — Normalize
  {
    const ox = stepX(1), oy = ROW_Y;
    pctx.strokeStyle = "#eee"; pctx.lineWidth = 0.5;
    pctx.setLineDash([4,4]);
    pctx.strokeRect(ox+PAD, oy+PAD, CSIZE-PAD*2, CSIZE-PAD*2);
    pctx.setLineDash([]);
    drawDots(pctx, normPts, ox, oy, "#2563eb");
  }

  // Step 3 — Compare: draw all template shapes faintly, user on top
  {
    const ox = stepX(2), oy = ROW_Y;
    training.forEach(t => {
      pctx.globalAlpha = 0.18;
      drawDots(pctx, t.pts, ox, oy, SHAPE_COLORS[t.label], 2);
    });
    pctx.globalAlpha = 1;
    drawDots(pctx, normPts, ox, oy, "#111", 3);
  }

  // Step 4 — K nearest: show K neighbors + distances
  {
    const ox = stepX(3), oy = ROW_Y;
    const itemH = Math.min((CSIZE - 8) / K, 22);
    neighbors.forEach((n, i) => {
      const y = oy + 6 + i * itemH;
      const barMaxW = CSIZE - 12;
      const maxDist = dists[dists.length-1].dist || 1;
      const barW = (1 - n.dist / maxDist) * barMaxW;
      pctx.fillStyle = SHAPE_COLORS[n.label];
      pctx.globalAlpha = 0.2;
      pctx.fillRect(ox + 6, y, barW, itemH - 3);
      pctx.globalAlpha = 1;
      pctx.fillStyle = SHAPE_COLORS[n.label];
      pctx.font = `${Math.max(9, itemH * 0.55)}px Arial`;
      pctx.textAlign = "left";
      pctx.fillText("#"+(i+1)+" "+n.label+" ("+n.dist.toFixed(1)+")", ox + 8, y + itemH * 0.7);
    });
    pctx.textAlign = "center";
  }

  // Step 5 — Output
  {
    const ox = stepX(4), oy = ROW_Y;
    pctx.strokeStyle = winnerColor; pctx.lineWidth = 2;
    pctx.strokeRect(ox + 2, oy + 2, CSIZE - 4, CSIZE - 4);

    const totalVotes = Object.values(votes).reduce((a,b)=>a+b,0);
    const barH = 14, barGap = 6;
    const labels = ["triangle","square","circle"];
    const barY0 = oy + (CSIZE - labels.length*(barH+barGap)) / 2;
    labels.forEach((lbl, i) => {
      const v = votes[lbl] || 0;
      const bw = Math.max(2, ((v / totalVotes) * (CSIZE - PAD*2)));
      const by = barY0 + i*(barH+barGap);
      pctx.fillStyle = "#f0f0f0";
      pctx.fillRect(ox+PAD, by, CSIZE-PAD*2, barH);
      pctx.fillStyle = SHAPE_COLORS[lbl];
      pctx.fillRect(ox+PAD, by, bw, barH);
      pctx.fillStyle = "#111"; pctx.font = `${fs-1}px Arial`; pctx.textAlign = "left";
      pctx.fillText(lbl+" ("+v+")", ox+PAD+4, by+barH-3);
    });

    pctx.fillStyle = winnerColor;
    pctx.font = `500 ${Math.round(fs*1.3)}px Arial`;
    pctx.textAlign = "center";
    pctx.fillText("It's a " + winner + "!", ox + CSIZE/2, oy + CSIZE + 28);
    pctx.fillStyle = "#999"; pctx.font = `${fs-1}px Arial`;
    pctx.fillText("K="+K+" | "+Object.entries(votes).map(([k,v])=>k+":"+v).join(", "), ox+CSIZE/2, oy+CSIZE+46);
  }
}
</script>
</body>
</html>
